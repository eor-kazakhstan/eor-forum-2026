<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>National EOR Forum 2026 — Astana, Kazakhstan</title>
<meta name="description" content="Register as a speaker or attendee for the National Forum on Enhanced Oil Recovery 2026, August 27–28, Rixos President Astana.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ───────────────────────────────────────────────── */
:root {
  --navy:        #001E40;
  --navy-mid:    #002a57;
  --navy-light:  #003570;
  --gold:        #C8922A;
  --gold-light:  #e8b84b;
  --gold-soft:   rgba(200,146,42,.13);
  --gold-rule:   rgba(200,146,42,.35);
  --white:       #ffffff;
  --off-white:   #f4f6f9;
  --text:        #e8edf4;
  --text-muted:  #8fa3bb;
  --text-dim:    #5a7290;
  --card-bg:     rgba(255,255,255,.04);
  --card-border: rgba(255,255,255,.09);
  --card-hover:  rgba(255,255,255,.07);
  --input-bg:    rgba(255,255,255,.06);
  --input-border:rgba(255,255,255,.15);
  --success-bg:  rgba(34,197,94,.12);
  --success:     #4ade80;
  --error:       #f87171;
  --shadow-card: 0 2px 4px rgba(0,0,0,.25), 0 12px 32px rgba(0,0,0,.3);
  --shadow-glow: 0 0 40px rgba(200,146,42,.12);
  --r:           14px;
  --r-sm:        9px;
}

/* ── RESET ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--text);
  font-family: "Inter", system-ui, sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,146,42,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0,53,112,.4) 0%, transparent 55%);
}

/* ── LAYOUT ───────────────────────────────────────────────── */
.wrap { max-width: 760px; margin: 0 auto; padding: 0 20px 80px; }

/* ── HERO ─────────────────────────────────────────────────── */
.hero {
  padding: 56px 0 44px;
  border-bottom: 1px solid var(--gold-rule);
  margin-bottom: 40px;
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 10px;
  font-size: .72rem; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 18px;
}
.hero-eyebrow::before {
  content: ""; display: block; width: 28px; height: 2px;
  background: var(--gold);
}
.hero h1 {
  font-family: "Playfair Display", serif;
  font-size: clamp(1.8rem, 5vw, 2.9rem);
  font-weight: 700; line-height: 1.1;
  color: var(--white); letter-spacing: -.01em;
  margin-bottom: 10px;
}
.hero h1 span { color: var(--gold-light); }
.hero-meta {
  display: flex; flex-wrap: wrap; gap: 6px 20px;
  font-size: .88rem; color: var(--text-muted);
  margin-bottom: 22px;
}
.hero-meta strong { color: var(--text); }
.hero-desc {
  font-size: .97rem; color: var(--text-muted);
  max-width: 560px; line-height: 1.7;
}

/* ── MODE TABS ────────────────────────────────────────────── */
.mode-tabs {
  display: flex; gap: 8px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--card-border);
  border-radius: 12px; padding: 5px;
  margin-bottom: 32px;
}
.mode-tab {
  flex: 1; border: 0; cursor: pointer;
  font-family: inherit; font-weight: 600; font-size: .9rem;
  padding: 11px 18px; border-radius: 9px;
  transition: .2s background, .2s color, .2s box-shadow;
  color: var(--text-muted); background: transparent;
}
.mode-tab.active {
  background: var(--gold);
  color: var(--navy);
  box-shadow: 0 2px 12px rgba(200,146,42,.35);
}
.mode-tab:not(.active):hover { background: var(--card-hover); color: var(--text); }

/* ── SECTION LABEL ────────────────────────────────────────── */
.section-label {
  font-size: .72rem; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 14px; padding-left: 2px;
}

/* ── DAY BLOCK ────────────────────────────────────────────── */
.day { margin-bottom: 32px; }
.day-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
}
.day-badge {
  font-family: "Playfair Display", serif;
  font-size: 1.05rem; font-weight: 600;
  color: var(--gold-light);
  background: var(--gold-soft);
  border: 1px solid var(--gold-rule);
  border-radius: 999px;
  padding: 4px 16px 5px;
  white-space: nowrap;
}
.day-rule { flex: 1; height: 1px; background: var(--card-border); }

/* ── SESSION CARD ─────────────────────────────────────────── */
.session {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--r);
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
  overflow: hidden;
  opacity: 0; transform: translateY(10px);
  animation: rise .45s ease forwards;
}
@keyframes rise { to { opacity:1; transform:none; } }

.session-head {
  padding: 16px 20px 13px;
  border-bottom: 1px solid var(--card-border);
  background: linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 100%);
}
.session-name {
  font-weight: 700; font-size: 1.05rem; color: var(--white);
  margin-bottom: 3px;
}
.session-meta {
  font-size: .84rem; color: var(--text-muted);
  display: flex; flex-wrap: wrap; gap: 4px 14px;
}
.session-notes {
  font-size: .82rem; color: var(--text-dim);
  font-style: italic; margin-top: 5px;
}

/* ── SLOT ROW ─────────────────────────────────────────────── */
.slot {
  padding: 13px 20px;
  border-bottom: 1px solid var(--card-border);
}
.slot:last-child { border-bottom: 0; }

.slot-row {
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.slot-left { display: flex; align-items: center; gap: 14px; }
.slot-time {
  font-weight: 600; font-size: .92rem;
  font-variant-numeric: tabular-nums;
  color: var(--text); white-space: nowrap;
}
.slot-title {
  font-size: .88rem; color: var(--text-muted);
}
.slot-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

/* ── PILLS ────────────────────────────────────────────────── */
.pill {
  font-size: .75rem; font-weight: 700;
  padding: 4px 11px; border-radius: 999px; white-space: nowrap;
}
.pill.open  { background: rgba(74,222,128,.12); color: var(--success); }
.pill.few   { background: rgba(200,146,42,.15); color: var(--gold-light); }
.pill.full  { background: rgba(255,255,255,.06); color: var(--text-dim); }

/* ── REGISTER BUTTON ──────────────────────────────────────── */
.reg-btn {
  border: 0; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: .88rem;
  padding: 8px 16px; border-radius: var(--r-sm);
  background: var(--gold); color: var(--navy);
  transition: .18s background, .18s transform;
  white-space: nowrap;
}
.reg-btn:hover { background: var(--gold-light); }
.reg-btn:active { transform: scale(.97); }
.reg-btn[disabled] {
  background: rgba(255,255,255,.07);
  color: var(--text-dim); cursor: default;
}

/* ── REGISTERED LIST ──────────────────────────────────────── */
.registered-list {
  font-size: .8rem; color: var(--text-dim);
  font-style: italic; margin-top: 6px;
}

/* ── INLINE FORM ──────────────────────────────────────────── */
.reg-form {
  display: none; flex-direction: column;
  gap: 10px; margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--card-border);
}
.reg-form.open { display: flex; }

.form-row { display: flex; gap: 10px; }
.form-row > * { flex: 1; min-width: 0; }

.form-label {
  font-size: .78rem; font-weight: 600;
  color: var(--text-muted); margin-bottom: 4px;
  letter-spacing: .04em; text-transform: uppercase;
}
.form-group { display: flex; flex-direction: column; }

input, textarea, select {
  font-family: inherit; font-size: .93rem;
  padding: 10px 13px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--r-sm);
  color: var(--text);
  transition: .18s border-color, .18s background;
  width: 100%;
}
input::placeholder, textarea::placeholder { color: var(--text-dim); }
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--gold);
  background: rgba(255,255,255,.08);
}
select { appearance: none; cursor: pointer; }
select option { background: var(--navy-mid); color: var(--text); }
textarea { resize: vertical; min-height: 80px; }

.form-actions { display: flex; gap: 10px; }
.btn-primary {
  flex: 1; border: 0; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: .95rem;
  padding: 11px; border-radius: var(--r-sm);
  background: var(--gold); color: var(--navy);
  transition: .18s background;
}
.btn-primary:hover { background: var(--gold-light); }
.btn-primary[disabled] {
  background: rgba(255,255,255,.07);
  color: var(--text-dim); cursor: default;
}
.btn-ghost {
  border: 1px solid var(--input-border); cursor: pointer;
  font-family: inherit; font-weight: 600; font-size: .95rem;
  padding: 11px 18px; border-radius: var(--r-sm);
  background: transparent; color: var(--text-muted);
  transition: .18s background, .18s color;
}
.btn-ghost:hover { background: var(--card-hover); color: var(--text); }

.form-error {
  font-size: .83rem; font-weight: 600;
  color: var(--error); display: none;
}
.form-success {
  background: var(--success-bg);
  border: 1px solid rgba(74,222,128,.2);
  border-radius: var(--r-sm);
  padding: 12px 16px;
  font-weight: 600; font-size: .92rem;
  color: var(--success);
}

/* ── SPEAKER-SPECIFIC EXTRAS ──────────────────────────────── */
.speaker-extras {
  display: none; flex-direction: column; gap: 10px;
}
.speaker-extras.show { display: flex; }

/* ── STATE ────────────────────────────────────────────────── */
.state {
  text-align: center; padding: 60px 0;
  color: var(--text-muted); font-size: .97rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(255,255,255,.08);
  border-top-color: var(--gold);
  border-radius: 50%; margin: 0 auto 16px;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CANCEL VIEW ──────────────────────────────────────────── */
.cancel-wrap {
  max-width: 500px; margin: 80px auto;
  text-align: center; padding: 0 20px;
}
.cancel-wrap h2 {
  font-family: "Playfair Display", serif;
  font-size: 1.7rem; color: var(--white);
  margin-bottom: 16px;
}
.cancel-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--r);
  padding: 24px; font-size: .97rem;
  box-shadow: var(--shadow-card);
}
.cancel-back {
  display: inline-block; margin-top: 22px;
  color: var(--gold); text-decoration: none;
  font-weight: 600; font-size: .9rem;
}
.cancel-back:hover { color: var(--gold-light); }

/* ── INFO BANNER ──────────────────────────────────────────── */
.info-banner {
  background: var(--gold-soft);
  border: 1px solid var(--gold-rule);
  border-radius: var(--r-sm);
  padding: 12px 16px;
  font-size: .86rem; color: var(--text-muted);
  margin-bottom: 24px;
  line-height: 1.5;
}
.info-banner strong { color: var(--gold-light); }

/* ── FOOTER ───────────────────────────────────────────────── */
footer {
  margin-top: 56px;
  padding-top: 24px;
  border-top: 1px solid var(--gold-rule);
  text-align: center;
  font-size: .8rem; color: var(--text-dim);
  line-height: 1.8;
}
footer a { color: var(--gold); text-decoration: none; }
footer a:hover { color: var(--gold-light); }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 540px) {
  .form-row { flex-direction: column; }
  .slot-row { flex-direction: column; align-items: flex-start; }
  .hero h1 { font-size: 1.75rem; }
  .mode-tab { font-size: .82rem; padding: 10px 10px; }
}

/* ── REDUCED MOTION ───────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .session { animation: none; opacity: 1; transform: none; }
  .spinner { animation: none; }
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="state"><div class="spinner"></div>Loading…</div>
</div>

<script>
// ================================================================
//  CONFIG — replace with your deployed Apps Script URL
// ================================================================
var API = "YOUR_APPS_SCRIPT_URL_HERE";
// ================================================================

var app = document.getElementById("app");
var currentMode = "speaker"; // "speaker" | "attendee"

// ── JSONP (bypasses CORS on all browsers incl. Safari iOS) ──────
function jsonp(url, cb) {
  var fn = "_cb" + Date.now() + Math.floor(Math.random() * 9999);
  var s  = document.createElement("script");
  var timer = setTimeout(function() {
    cleanup(); cb(null);
  }, 40000);
  window[fn] = function(data) { cleanup(); cb(data); };
  s.onerror  = function()     { cleanup(); cb(null); };
  function cleanup() {
    clearTimeout(timer);
    delete window[fn];
    if (s.parentNode) s.parentNode.removeChild(s);
  }
  s.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + "callback=" + fn;
  document.head.appendChild(s);
}

// ── BOOT ────────────────────────────────────────────────────────
var params = new URLSearchParams(window.location.search);
var cancelToken = params.get("cancel");
if (cancelToken) {
  showCancel(cancelToken);
} else {
  loadSlots();
}

// ── LOAD SLOTS (with cold-start retry) ──────────────────────────
function loadSlots(attempt) {
  attempt = attempt || 1;
  app.innerHTML = attempt === 1
    ? '<div class="state"><div class="spinner"></div>Loading programme…</div>'
    : '<div class="state"><div class="spinner"></div>Server warming up, one moment…</div>';

  jsonp(API + "?action=getData", function(data) {
    if (!data) {
      if (attempt < 3) { loadSlots(attempt + 1); return; }
      app.innerHTML =
        '<div class="state">⚠️ Could not load the programme.<br>Please check your connection and try again.<br><br>' +
        '<button class="reg-btn" style="margin:0 auto" onclick="loadSlots(1)">Retry</button></div>';
      return;
    }
    render(data);
  });
}

// ── MAIN RENDER ─────────────────────────────────────────────────
function render(data) {
  var slots = data.slots || [];

  var html = buildHero(data);
  html += buildTabs();
  html += '<div id="mode-speaker">' + buildModeContent(slots, "speaker", data) + '</div>';
  html += '<div id="mode-attendee" style="display:none">' + buildModeContent(slots, "attendee", data) + '</div>';
  html += buildFooter(data);

  app.innerHTML = html;
}

function buildHero(data) {
  return (
    '<header class="hero">' +
      '<div class="hero-eyebrow">Registration</div>' +
      '<h1>National Forum on<br><span>Enhanced Oil Recovery</span> 2026</h1>' +
      '<div class="hero-meta">' +
        '<span>📅 <strong>August 27–28, 2026</strong></span>' +
        '<span>📍 <strong>Rixos President Astana</strong>, Kazakhstan</span>' +
      '</div>' +
      '<p class="hero-desc">Register as a speaker to propose a presentation, or as an attendee to secure your place at Kazakhstan\'s national EOR forum.</p>' +
    '</header>'
  );
}

function buildTabs() {
  return (
    '<div class="mode-tabs">' +
      '<button class="mode-tab active" id="tab-speaker" onclick="switchMode(\'speaker\')">🎤 Speaker Registration</button>' +
      '<button class="mode-tab" id="tab-attendee" onclick="switchMode(\'attendee\')">🪑 Attendee Registration</button>' +
    '</div>'
  );
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById("mode-speaker").style.display  = mode === "speaker"  ? "" : "none";
  document.getElementById("mode-attendee").style.display = mode === "attendee" ? "" : "none";
  document.getElementById("tab-speaker").classList.toggle("active",  mode === "speaker");
  document.getElementById("tab-attendee").classList.toggle("active", mode === "attendee");
}

// ── BUILD MODE CONTENT ───────────────────────────────────────────
function buildModeContent(slots, mode, data) {
  var filtered = slots.filter(function(s) { return s.mode === mode || s.mode === "both"; });

  if (mode === "speaker") {
    return buildSpeakerBanner() + buildDays(filtered, mode);
  } else {
    return buildAttendeeBanner() + buildDays(filtered, mode);
  }
}

function buildSpeakerBanner() {
  return (
    '<div class="info-banner">' +
      '<strong>Speakers:</strong> Select a session and time slot, then provide your presentation details. ' +
      'You will receive a confirmation email with a calendar invite and cancellation link.' +
    '</div>'
  );
}

function buildAttendeeBanner() {
  return (
    '<div class="info-banner">' +
      '<strong>Attendees:</strong> Select the day(s) you plan to attend and complete your registration. ' +
      'Attendance is subject to confirmation by the organising committee.' +
    '</div>'
  );
}

function buildDays(slots, mode) {
  if (!slots.length) {
    return '<div class="state" style="padding:40px 0">No slots available yet.<br>Check back soon.</div>';
  }

  var days = {}, dayOrder = [];
  slots.forEach(function(s) {
    if (!days[s.dateISO]) {
      days[s.dateISO] = { label: s.dateLabel, sessions: {}, sessionOrder: [] };
      dayOrder.push(s.dateISO);
    }
    var d = days[s.dateISO];
    if (!d.sessions[s.session]) {
      d.sessions[s.session] = { location: s.location, notes: s.notes, items: [] };
      d.sessionOrder.push(s.session);
    }
    d.sessions[s.session].items.push(s);
  });

  var html = "", delay = 0;
  dayOrder.forEach(function(iso) {
    var d = days[iso];
    html += '<div class="day">';
    html += '<div class="day-header"><div class="day-badge">' + esc(d.label) + '</div><div class="day-rule"></div></div>';

    d.sessionOrder.forEach(function(sname) {
      var sess = d.sessions[sname];
      var totalOpen = sess.items.reduce(function(acc, s) { return acc + s.remaining; }, 0);
      html += '<div class="session" style="animation-delay:' + delay + 'ms">';
      delay += 60;
      html += '<div class="session-head">';
      html += '<div class="session-name">' + esc(sname) + '</div>';
      html += '<div class="session-meta">';
      if (sess.location) html += '<span>📍 ' + esc(sess.location) + '</span>';
      html += '<span>' + totalOpen + ' slot' + (totalOpen !== 1 ? 's' : '') + ' available</span>';
      html += '</div>';
      if (sess.notes) html += '<div class="session-notes">' + esc(sess.notes) + '</div>';
      html += '</div>'; // session-head

      sess.items.forEach(function(s) { html += buildSlot(s, mode); });
      html += '</div>'; // session
    });
    html += '</div>'; // day
  });
  return html;
}

// ── SLOT ─────────────────────────────────────────────────────────
function buildSlot(s, mode) {
  var full  = s.remaining <= 0;
  var few   = s.remaining <= 2 && !full;
  var pcls  = full ? "full" : (few ? "few" : "open");
  var ptxt  = full ? "Full" : (s.remaining + " available");

  var uid = mode + "-" + s.id;

  var regList = "";
  if (s.registered && s.registered.length) {
    regList = '<div class="registered-list">Already registered: ' +
      s.registered.map(esc).join(", ") + '</div>';
  }

  var formHtml = full ? "" : buildForm(uid, s, mode);

  return (
    '<div class="slot" id="slot-' + uid + '">' +
      '<div class="slot-row">' +
        '<div class="slot-left">' +
          '<span class="slot-time">' + esc(s.timeStart) + ' – ' + esc(s.timeEnd) + '</span>' +
          (s.slotLabel ? '<span class="slot-title">' + esc(s.slotLabel) + '</span>' : '') +
        '</div>' +
        '<div class="slot-right">' +
          '<span class="pill ' + pcls + '">' + ptxt + '</span>' +
          (full
            ? '<button class="reg-btn" disabled>Full</button>'
            : '<button class="reg-btn" onclick="openForm(\'' + uid + '\')">Register</button>') +
        '</div>' +
      '</div>' +
      regList +
      formHtml +
    '</div>'
  );
}

// ── FORMS ────────────────────────────────────────────────────────
function buildForm(uid, s, mode) {
  var speakerExtras = mode === "speaker" ? (
    '<div class="speaker-extras show">' +
      '<div class="form-group">' +
        '<div class="form-label">Presentation title *</div>' +
        '<input id="title-' + uid + '" placeholder="e.g. Polymer flooding results at Tengiz Field">' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group">' +
          '<div class="form-label">Topic / Session *</div>' +
          '<select id="topic-' + uid + '">' +
            '<option value="">— Select —</option>' +
            '<option>Polymer flooding</option>' +
            '<option>Chemical EOR (SP/ASP/AP)</option>' +
            '<option>Gas EOR (CO₂, N₂, WAG)</option>' +
            '<option>Thermal EOR</option>' +
            '<option>Combined EOR</option>' +
            '<option>Conformance control</option>' +
            '<option>Hydraulic fracturing</option>' +
            '<option>Digital / AI field development</option>' +
            '<option>Hard-to-recover reserves</option>' +
            '<option>EOR Hackathon</option>' +
            '<option>Other</option>' +
          '</select>' +
        '</div>' +
        '<div class="form-group">' +
          '<div class="form-label">Duration (min) *</div>' +
          '<select id="duration-' + uid + '">' +
            '<option value="">— Select —</option>' +
            '<option value="15">15 min</option>' +
            '<option value="20">20 min</option>' +
            '<option value="30">30 min</option>' +
            '<option value="45">45 min</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
      '<div class="form-group">' +
        '<div class="form-label">Abstract (100–300 words) *</div>' +
        '<textarea id="abstract-' + uid + '" placeholder="Summarise your presentation…"></textarea>' +
      '</div>' +
    '</div>'
  ) : "";

  return (
    '<div class="reg-form" id="form-' + uid + '">' +
      '<div class="form-row">' +
        '<div class="form-group">' +
          '<div class="form-label">First & Last name *</div>' +
          '<input id="name-' + uid + '" placeholder="Dr. Ivan Petrov" autocomplete="name">' +
        '</div>' +
        '<div class="form-group">' +
          '<div class="form-label">Job title</div>' +
          '<input id="jobtitle-' + uid + '" placeholder="Senior Reservoir Engineer">' +
        '</div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group">' +
          '<div class="form-label">Company / Organisation *</div>' +
          '<input id="company-' + uid + '" placeholder="KazMunayGas" autocomplete="organization">' +
        '</div>' +
        '<div class="form-group">' +
          '<div class="form-label">Country</div>' +
          '<input id="country-' + uid + '" placeholder="Kazakhstan" autocomplete="country-name">' +
        '</div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group">' +
          '<div class="form-label">Email *</div>' +
          '<input id="email-' + uid + '" type="email" placeholder="name@company.com" autocomplete="email">' +
        '</div>' +
        '<div class="form-group">' +
          '<div class="form-label">Phone / WhatsApp</div>' +
          '<input id="phone-' + uid + '" placeholder="+7 700 000 0000" autocomplete="tel">' +
        '</div>' +
      '</div>' +
      speakerExtras +
      '<div class="form-error" id="err-' + uid + '"></div>' +
      '<div class="form-actions">' +
        '<button class="btn-ghost" onclick="closeForm(\'' + uid + '\')">Cancel</button>' +
        '<button class="btn-primary" id="go-' + uid + '" onclick="submitForm(\'' + uid + '\',\'' + mode + '\')">Confirm Registration</button>' +
      '</div>' +
    '</div>'
  );
}

// ── FORM LOGIC ───────────────────────────────────────────────────
function openForm(uid) {
  document.getElementById("form-" + uid).classList.add("open");
  document.getElementById("name-" + uid).focus();
  // Close any other open forms
  document.querySelectorAll(".reg-form.open").forEach(function(el) {
    if (el.id !== "form-" + uid) el.classList.remove("open");
  });
}
function closeForm(uid) {
  document.getElementById("form-" + uid).classList.remove("open");
}

function submitForm(uid, mode) {
  var name     = val("name-"     + uid);
  var jobtitle = val("jobtitle-" + uid);
  var company  = val("company-"  + uid);
  var country  = val("country-"  + uid);
  var email    = val("email-"    + uid);
  var phone    = val("phone-"    + uid);

  // Speaker-only fields
  var title    = mode === "speaker" ? val("title-"    + uid) : "";
  var topic    = mode === "speaker" ? val("topic-"    + uid) : "";
  var duration = mode === "speaker" ? val("duration-" + uid) : "";
  var abstract = mode === "speaker" ? val("abstract-" + uid) : "";

  var errEl = document.getElementById("err-" + uid);
  var goBtn = document.getElementById("go-"  + uid);

  errEl.style.display = "none";

  // Validation
  if (!name.trim()) { showErr(uid, "Please enter your full name."); return; }
  if (!company.trim()) { showErr(uid, "Please enter your company or organisation."); return; }
  if (!email.trim() || email.indexOf("@") < 0) { showErr(uid, "Please enter a valid email address."); return; }
  if (mode === "speaker") {
    if (!title.trim())    { showErr(uid, "Please enter a presentation title."); return; }
    if (!topic)           { showErr(uid, "Please select a topic / session."); return; }
    if (!duration)        { showErr(uid, "Please select a duration."); return; }
    if (abstract.trim().length < 50) { showErr(uid, "Abstract must be at least 50 characters."); return; }
  }

  goBtn.disabled = true; goBtn.textContent = "Sending…";

  // Extract slotId from uid (strip mode prefix)
  var slotId = uid.replace(/^(speaker|attendee)-/, "");

  var url = API +
    "?action=register" +
    "&slotId="    + enc(slotId) +
    "&mode="      + enc(mode) +
    "&name="      + enc(name) +
    "&jobtitle="  + enc(jobtitle) +
    "&company="   + enc(company) +
    "&country="   + enc(country) +
    "&email="     + enc(email) +
    "&phone="     + enc(phone) +
    "&title="     + enc(title) +
    "&topic="     + enc(topic) +
    "&duration="  + enc(duration) +
    "&abstract="  + enc(abstract);

  jsonp(url, function(res) {
    if (!res) {
      goBtn.disabled = false; goBtn.textContent = "Confirm Registration";
      showErr(uid, "Network error — please try again.");
      return;
    }
    if (res.ok) {
      document.getElementById("slot-" + uid).innerHTML =
        '<div class="form-success">✅ ' + esc(res.message) + '</div>';
    } else {
      goBtn.disabled = false; goBtn.textContent = "Confirm Registration";
      showErr(uid, res.message);
    }
  });
}

function showErr(uid, msg) {
  var el = document.getElementById("err-" + uid);
  el.textContent = msg;
  el.style.display = "block";
}

// ── CANCEL ───────────────────────────────────────────────────────
function showCancel(token) {
  app.innerHTML =
    '<div class="cancel-wrap"><h2>Cancellation</h2>' +
    '<div class="cancel-card"><div class="spinner" style="width:22px;height:22px;border-width:2px;margin-bottom:10px"></div>Processing…</div></div>';

  jsonp(API + "?action=cancel&t=" + enc(token), function(res) {
    if (!res) {
      app.innerHTML = '<div class="cancel-wrap"><div class="cancel-card">Network error. Please try again.</div></div>';
      return;
    }
    app.innerHTML =
      '<div class="cancel-wrap">' +
        '<h2>' + (res.ok ? '✅ Registration cancelled' : 'Notice') + '</h2>' +
        '<div class="cancel-card">' + esc(res.message) + '</div>' +
        '<a class="cancel-back" href="' + window.location.pathname + '">← Back to registration</a>' +
      '</div>';
  });
}

// ── UTILS ─────────────────────────────────────────────────────────
function val(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : "";
}
function enc(s) { return encodeURIComponent(s == null ? "" : s); }
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
